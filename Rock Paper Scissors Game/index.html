<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Super RPS Hero</title>
    <link rel="stylesheet" href="style.css">
</head>

<body>

    <h1>✊ 🖐️ ✌️<br>SUPER RPS HERO</h1>

    <div class="mode-container">
        <button onclick="setMode('single')" class="mode-btn">1 PLAYER</button>
    </div>

    <div class="scoreboard">
        <div class="score-box">
            <div id="player1-name">YOU</div>
            <div id="player-score"
            class="score">0</div>
        </div>

        <div class="score-box">
            <div id="player2-name">ROBOT</div>
            <div id="computer-score"
            class="score red">0</div>
        </div>
    </div>

    <div class="arena">

        <div class="choice-display">
            <span id="left-label">Your Hero</span>
            <div id="player-choice-display"
            class="battle-icon">❓</div>
        </div>

        <div class="choice-display">
            <span id="right-label">Robot Enemy</span>
            <div id="computer-choice-display" class="battle-icon">❓</div>
        </div>

    </div>

    <div class="result-banner" id="result-text">
        Pick your move!
    </div>

    <div class="button-container">
        <button class="game-btn" onclick="playGame('rock')">✊</button>
        <button class="game-btn" onclick="playGame('paper')">🖐️</button>
        <button class="game-btn" onclick="playGame('scissors')">✌️</button>
    </div>

    <button onclick="resetGame()" class="reset-btn">
        Restart Match
    </button>

    <script src="script.js"></script>

</body>

</html>
